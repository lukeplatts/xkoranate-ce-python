name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to release (e.g. v0.4.0-pr1). Must already exist or will be created from the current ref."
        required: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  build-macos:
    name: Build macOS app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create venv and install build dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -e . pyinstaller

      - name: Determine version
        id: version
        run: echo "version=$(.venv/bin/python -c 'import xkoranate; print(xkoranate.__version__)')" >> "$GITHUB_OUTPUT"

      - name: Build xkoranate.app
        run: ./build_app.sh

      - name: Zip app bundle (preserving bundle structure/permissions)
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent xkoranate.app "../xkoranate-${{ steps.version.outputs.version }}-macos.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: xkoranate-macos
          path: xkoranate-${{ steps.version.outputs.version }}-macos.zip

  build-windows:
    name: Build Windows app
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create venv and install build dependencies
        run: |
          python -m venv .venv
          .venv\Scripts\pip install -e . pyinstaller

      - name: Determine version
        id: version
        run: |
          $ver = .venv\Scripts\python.exe -c "import xkoranate; print(xkoranate.__version__)"
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Build xkoranate.exe
        run: .\build_app.bat

      - name: Zip app folder
        run: Compress-Archive -Path dist\xkoranate -DestinationPath "xkoranate-${{ steps.version.outputs.version }}-windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: xkoranate-windows
          path: xkoranate-${{ steps.version.outputs.version }}-windows.zip

  build-linux:
    name: Build Linux app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Qt runtime dependencies
        # PyInstaller only bundles a library into the Linux build if it can
        # resolve it (via ldd) on THIS machine at build time — anything
        # missing here is silently left out of dist/, then breaks for every
        # end user regardless of what they have installed. This list is the
        # full transitive closure needed by the bundled Qt plugins (xcb,
        # offscreen, image formats, etc.) so the shipped binary is
        # self-contained. libegl1/libgl1 are the one exception: Qt loads
        # them via dlopen (not a linked dependency), so PyInstaller can't
        # detect or bundle them — they're left to resolve from the host's
        # graphics driver, which every real Linux desktop already provides.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libnss3 \
            libxcomposite1 \
            libxrandr2 \
            libxi6 \
            libxtst6 \
            libxcb-cursor0 \
            libglib2.0-0 \
            libfontconfig1 \
            libsm6 \
            libice6 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xkb1 \
            libwebp7 \
            libwebpdemux2 \
            libwebpmux3

      - name: Create venv and install build dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -e . pyinstaller

      - name: Determine version
        id: version
        run: echo "version=$(.venv/bin/python -c 'import xkoranate; print(xkoranate.__version__)')" >> "$GITHUB_OUTPUT"

      - name: Build xkoranate binary
        run: ./build_app.sh

      - name: Verify binary launches self-contained (no runtime deps beyond the GPU driver)
        # Running this on the build runner itself would prove nothing — it
        # already has every library apt-get installed above, so a bundling
        # regression (a lib that stops resolving and silently drops out of
        # dist/) would be masked by the system-wide copy. Instead, launch the
        # binary inside a bare `ubuntu:24.04` container that only has an X
        # server and the graphics driver libs (libegl1/libgl1 — the two
        # libraries Qt loads via dlopen, so PyInstaller can never bundle
        # them; every real Linux desktop already has these). If anything
        # else is missing from the bundle, this fails exactly like it would
        # on a user's machine.
        run: |
          docker run --rm -v "$PWD/dist/xkoranate:/app:ro" ubuntu:24.04 bash -c '
            set -e
            apt-get update -qq
            apt-get install -y -qq xvfb libegl1 libgl1 >/dev/null
            cp -r /app /tmp/xkoranate && cd /tmp/xkoranate
            Xvfb :99 -screen 0 1024x768x24 &
            sleep 1
            DISPLAY=:99 ./xkoranate &
            pid=$!
            sleep 5
            if ! kill -0 "$pid" 2>/dev/null; then
              echo "::error::xkoranate binary exited before the launch check completed"
              wait "$pid" || true
              exit 1
            fi
            kill "$pid"
            wait "$pid" 2>/dev/null || true
            echo "xkoranate launched and stayed running with no system deps beyond libegl1/libgl1"
          '

      - name: Tar app folder (preserving exec bits)
        run: tar -C dist -czf "xkoranate-${{ steps.version.outputs.version }}-linux.tar.gz" xkoranate

      - uses: actions/upload-artifact@v4
        with:
          name: xkoranate-linux
          path: xkoranate-${{ steps.version.outputs.version }}-linux.tar.gz

  publish-release:
    name: Publish draft GitHub release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag_name }}" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft release with build artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/xkoranate-macos/*.zip
            artifacts/xkoranate-windows/*.zip
            artifacts/xkoranate-linux/*.tar.gz
