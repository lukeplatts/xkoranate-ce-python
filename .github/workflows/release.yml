name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to release (e.g. v0.4.0-pr1). Must already exist or will be created from the current ref."
        required: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  build-macos:
    name: Build macOS app (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        # GitHub's Apple Silicon runners can't produce an x86_64 binary (and
        # vice versa) — PyInstaller bundles the build machine's own native
        # Python/Qt libraries, so each architecture needs its own native
        # runner. macos-15-intel is GitHub's last supported Intel image
        # (macos-13 was retired Dec 2025); it's slated to go away in turn
        # around August 2027, at which point Intel Macs will need Rosetta 2
        # to keep running whatever the arm64 build produces at that time.
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create venv and install build dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -e . pyinstaller

      - name: Determine version
        id: version
        run: echo "version=$(.venv/bin/python -c 'import xkoranate; print(xkoranate.__version__)')" >> "$GITHUB_OUTPUT"

      - name: Build xkoranate.app
        run: ./build_app.sh

      - name: Verify app was built for the expected architecture
        # PyInstaller silently builds for whatever Python it's run with —
        # if a runner label above ever gets remapped by GitHub to the wrong
        # architecture, this catches a mismatched build before it ships
        # instead of shipping an arm64 binary labeled x86_64 or vice versa.
        run: |
          got="$(lipo -archs "dist/xkoranate.app/Contents/MacOS/xkoranate-bin")"
          case "$got" in
            *${{ matrix.arch }}*) echo "xkoranate-bin is '$got', matches expected ${{ matrix.arch }}" ;;
            *) echo "::error::xkoranate-bin is '$got', expected ${{ matrix.arch }}"; exit 1 ;;
          esac

      - name: Verify app actually launches
        # A bundle existing doesn't mean it opens — a missing Info.plist key,
        # a data file collected under the wrong Resources path, etc. would
        # still produce a valid bundle that crashes on first launch, which
        # this would ship without catching.
        run: |
          "dist/xkoranate.app/Contents/MacOS/xkoranate" &
          pid=$!
          sleep 5
          if ! kill -0 "$pid" 2>/dev/null; then
            echo "::error::xkoranate.app exited before the launch check completed"
            wait "$pid" || true
            exit 1
          fi
          kill "$pid"
          wait "$pid" 2>/dev/null || true
          echo "xkoranate.app launched and stayed running"

      - name: Zip app bundle (preserving bundle structure/permissions)
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent xkoranate.app "../xkoranate-${{ steps.version.outputs.version }}-macos-${{ matrix.arch }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: xkoranate-macos-${{ matrix.arch }}
          path: xkoranate-${{ steps.version.outputs.version }}-macos-${{ matrix.arch }}.zip

  build-windows:
    name: Build Windows app
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create venv and install build dependencies
        run: |
          python -m venv .venv
          .venv\Scripts\pip install -e . pyinstaller

      - name: Determine version
        id: version
        run: |
          $ver = .venv\Scripts\python.exe -c "import xkoranate; print(xkoranate.__version__)"
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Build xkoranate.exe
        run: .\build_app.bat

      - name: Verify exe actually launches
        # The exe existing doesn't mean it opens — a missing bundled DLL or
        # data file would still produce a valid exe that crashes on first
        # run, which this would ship without catching.
        run: |
          $proc = Start-Process -FilePath "dist\xkoranate\xkoranate.exe" -PassThru
          Start-Sleep -Seconds 5
          if ($proc.HasExited) {
            Write-Error "xkoranate.exe exited before the launch check completed"
            exit 1
          }
          Stop-Process -Id $proc.Id -Force
          Write-Host "xkoranate.exe launched and stayed running"

      - name: Zip app folder
        run: Compress-Archive -Path dist\xkoranate -DestinationPath "xkoranate-${{ steps.version.outputs.version }}-windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: xkoranate-windows
          path: xkoranate-${{ steps.version.outputs.version }}-windows.zip

  build-linux:
    name: Build Linux app
    # Pinned older than ubuntu-latest on purpose: PyInstaller bundles the
    # build machine's own libpython.so, which is linked against that
    # machine's glibc. glibc symbol versioning is backwards-compatible only
    # (an older glibc can't satisfy symbols versioned for a newer one), so
    # building on ubuntu-latest (24.04, glibc 2.39) shipped a binary that
    # instantly failed with "version `GLIBC_2.38' not found" on anything
    # older — including Linux Mint 21.x (glibc 2.35, released 2023 and still
    # widely used). Building on 22.04 (glibc 2.35) instead trades away
    # nothing on newer systems (still forward-compatible) while covering a
    # much wider range of currently-deployed distros.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Qt runtime dependencies
        # PyInstaller only bundles a library into the Linux build if it can
        # resolve it (via ldd) on THIS machine at build time — anything
        # missing here is silently left out of dist/, then breaks for every
        # end user regardless of what they have installed. This list is the
        # full transitive closure needed by the bundled Qt plugins (xcb,
        # offscreen, image formats, etc.) so the shipped binary is
        # self-contained. libegl1/libgl1 are the one exception: Qt loads
        # them via dlopen (not a linked dependency), so PyInstaller can't
        # detect or bundle them — they're left to resolve from the host's
        # graphics driver, which every real Linux desktop already provides.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libnss3 \
            libxcomposite1 \
            libxrandr2 \
            libxi6 \
            libxtst6 \
            libxcb-cursor0 \
            libglib2.0-0 \
            libfontconfig1 \
            libsm6 \
            libice6 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xkb1 \
            libwebp7 \
            libwebpdemux2 \
            libwebpmux3

      - name: Create venv and install build dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -e . pyinstaller

      - name: Determine version
        id: version
        run: echo "version=$(.venv/bin/python -c 'import xkoranate; print(xkoranate.__version__)')" >> "$GITHUB_OUTPUT"

      - name: Build xkoranate binary
        run: ./build_app.sh

      - name: Verify binary launches self-contained (no runtime deps beyond the GPU driver)
        # Running this on the build runner itself would prove nothing — it
        # already has every library apt-get installed above (and matches its
        # own glibc exactly, which is exactly how the GLIBC_2.38 regression
        # above shipped unnoticed). Launch the binary inside a bare
        # `ubuntu:22.04` container instead — our oldest supported target's
        # glibc baseline (matches Linux Mint 21.x) — with only an X server
        # and the graphics driver libs (libegl1/libgl1 — the two libraries
        # Qt loads via dlopen, so PyInstaller can never bundle them; every
        # real Linux desktop already has these). If anything else is
        # missing, or if a future bump of the build runner raises the glibc
        # floor again, this fails exactly like it would on a user's machine.
        run: |
          docker run --rm -v "$PWD/dist/xkoranate:/app:ro" ubuntu:22.04 bash -c '
            set -e
            apt-get update -qq
            apt-get install -y -qq xvfb libegl1 libgl1 >/dev/null
            cp -r /app /tmp/xkoranate && cd /tmp/xkoranate
            Xvfb :99 -screen 0 1024x768x24 &
            sleep 1
            DISPLAY=:99 ./xkoranate &
            pid=$!
            sleep 5
            if ! kill -0 "$pid" 2>/dev/null; then
              echo "::error::xkoranate binary exited before the launch check completed"
              wait "$pid" || true
              exit 1
            fi
            kill "$pid"
            wait "$pid" 2>/dev/null || true
            echo "xkoranate launched and stayed running with no system deps beyond libegl1/libgl1"
          '

      - name: Tar app folder (preserving exec bits)
        run: tar -C dist -czf "xkoranate-${{ steps.version.outputs.version }}-linux.tar.gz" xkoranate

      - uses: actions/upload-artifact@v4
        with:
          name: xkoranate-linux
          path: xkoranate-${{ steps.version.outputs.version }}-linux.tar.gz

  publish-release:
    name: Publish draft GitHub release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag_name }}" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft release with build artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/xkoranate-macos-*/*.zip
            artifacts/xkoranate-windows/*.zip
            artifacts/xkoranate-linux/*.tar.gz
